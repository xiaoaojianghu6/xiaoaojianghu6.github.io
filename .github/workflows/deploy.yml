name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site structure
        run: |
          # Copy public/ contents to deploy root
          cp -r public/* .
          # Root-level HTMLs are already in place (index.html, builder.html)
          # Clean up non-deploy files
          rm -rf public/ _archive/ docs/ node_modules/ .gitignore CLAUDE.md README.md .github/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
