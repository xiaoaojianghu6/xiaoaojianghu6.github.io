baseURL = "https://xiaoaojianghu6.github.io/"  # 你的博客部署地址，比如 GitHub Pages
languageCode = "zh-cn"  # 设置语言为中文
title= "william's blog"
theme = "PaperMod"  # 使用 PaperMod 主题，简洁且支持 Dark 模式
publishDir= "docs"
# 参数设置：启用 Dark 主题和高级 UI
[params]
  defaultTheme = "dark"  # 默认启用 Dark 主题，高级深色风格
  disableThemeToggle = false  # 允许用户切换主题，保留灵活性

  # 字体设置：苹果风格
  [params.font]
    family = "SF Pro, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif"  # 优先使用苹果 SF Pro 字体，优雅简洁

  # 颜色设置：深色高级审美
  [params.colors]
    background = "#121212"  # 深灰背景，苹果风格的低调高级感
    text = "#e0e0e0"  # 浅灰文字，柔和易读
    link = "#bb86fc"  # 紫色链接，Dark 主题下的点睛之笔

  # 自定义 CSS：实现圆角和阴影
  customCSS = ["custom.css"]  # 加载自定义 CSS 文件，进一步精致化 UI

  # 社交图标：简洁展示
  [params.socialIcons]
    github = "https://github.com/xiaoaojianghu6"  # GitHub 链接
    
  # 首页精简：极简风格
  hideSummary = true  # 隐藏文章摘要，保持首页干净
  showReadingTime = false  # 不显示阅读时间，简洁至上